name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (version 22)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the Next.js app
      - name: Build the Next.js app
        run: npm run build

      # 5️⃣ Debug: List workspace root
      - name: List workspace root
        run: |
          echo "Workspace root:"
          ls -la

      # 6️⃣ Debug: Check .next directory
      - name: Check .next directory
        run: |
          if [ -d ".next" ]; then
            echo ".next directory exists:"
            ls -la .next
          else
            echo "❌ .next directory does not exist!"
            exit 1
          fi

      # 7️⃣ Debug: Check package.json and package-lock.json
      - name: Check package files
        run: |
          if [ -f "package.json" ]; then
            echo "package.json found!"
          else
            echo "❌ package.json not found!"
            exit 1
          fi
          if [ -f "package-lock.json" ]; then
            echo "package-lock.json found!"
          else
            echo "❌ package-lock.json not found!"
            exit 1
          fi

      # 8️⃣ Copy build artifacts to the server
      - name: Copy files to the server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: |
            .next/
            package.json
            package-lock.json
          target: /home/ubuntu/temp_deploy

      # 🔟 SSH into the server and run deployment commands as root
      - name: Deploy app on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            sudo su <<'EOF'
            rsync -av --delete /home/ubuntu/temp_deploy/ /var/www/RHR-Frontend/
            cd /var/www/RHR-Frontend
            export PATH=$PATH:/usr/local/bin
            npm ci --omit=dev
            pm2 start npm --name "rhr-frontend" -- start || pm2 restart rhr-frontend
            pm2 save
            exit
            EOF
