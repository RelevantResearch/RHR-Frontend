name: Secure Build and Deploy Next.js App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1️⃣ Security Analysis (CodeQL)
  analyze:
    name: Analyze with CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Initialize CodeQL without config file reference
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Removed the config-file parameter

      - name: Install dependencies
        run: npm ci

      - name: Build project (needed for proper analysis)
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # 2️⃣ Build and Deploy (depends on security scan)
  build-and-deploy:
    needs: analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify build artifacts
        run: |
          [ -d ".next" ] || { echo "❌ Build failed!"; exit 1; }
          ls -la .next

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            mkdir -p /home/ubuntu/temp_deploy
            rsync -av --delete /home/ubuntu/temp_deploy/ /var/www/RHR-Frontend/
            cd /var/www/RHR-Frontend
            npm ci --omit=dev
            pm2 start npm --name "rhr-frontend" -- start || pm2 restart rhr-frontend
            pm2 save
