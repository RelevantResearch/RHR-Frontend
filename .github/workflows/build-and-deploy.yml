name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (version 22)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the Next.js app
      - name: Build the Next.js app
        run: npm run build

      # 5️⃣ List workspace root
      - name: List workspace root
        run: |
          echo "Workspace root contents:"
          ls -la

      # 6️⃣ Check .next directory
      - name: Check .next directory
        run: |
          if [ -d ".next" ]; then
            echo ".next directory exists:"
            ls -la .next
          else
            echo ".next directory does not exist!"
            exit 1
          fi

      # 7️⃣ Check package files
      - name: Check package files
        run: |
          if [ -f "package.json" ]; then
            echo "package.json found!"
          else
            echo "package.json not found!"
            exit 1
          fi

          if [ -f "package-lock.json" ]; then
            echo "package-lock.json found!"
          else
            echo "package-lock.json not found!"
            exit 1
          fi

      # 8️⃣ Check all build artifacts before upload
      - name: Check all build artifacts before upload
        run: |
          echo "Checking .next directory:"
          ls -la .next || echo ".next directory missing!"
          echo "Checking package.json:"
          ls -la package.json || echo "package.json missing!"
          echo "Checking package-lock.json:"
          ls -la package-lock.json || echo "package-lock.json missing!"

      # 9️⃣ Ensure target directory exists on the server
      - name: Ensure target directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            mkdir -p /home/ubuntu/temp_deploy

      - name: Confirm build artifacts exist
        run: |
          echo "Checking .next directory:"
          ls -la .next || { echo ".next directory missing! Build might have failed!"; exit 1; }
          echo "Checking package.json:"
          ls -la package.json || { echo "package.json missing!"; exit 1; }
          echo "Checking package-lock.json:"
          ls -la package-lock.json || { echo "package-lock.json missing!"; exit 1; }

      # 🔟 Copy build artifacts to the server
      - name: Copy files to the server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: |
            .next/
            package.json
            package-lock.json
          target: /home/ubuntu/temp_deploy

      # 1️⃣1️⃣ Deploy app on server
      - name: Deploy app on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            echo "Node location: $(which node)"
            echo "NPM location: $(which npm)"
            echo "PM2 location: $(which pm2)"
            rsync -av --delete /home/ubuntu/temp_deploy/ /var/www/RHR-Frontend/
            cd /var/www/RHR-Frontend
            npm ci --omit=dev
            pm2 start npm --name "rhr-frontend" -- start || pm2 restart rhr-frontend
            pm2 save
