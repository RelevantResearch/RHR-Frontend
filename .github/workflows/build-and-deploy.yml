name: Build, Scan, and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  # 1️⃣ Security Scanning (CodeQL + Dependency Checks)
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔍 Run CodeQL Static Analysis (JavaScript/TypeScript)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Install dependencies
        run: npm ci

      - name: Build the app (needed for CodeQL analysis)
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # ⚠️ Check for vulnerable dependencies
      - name: Check for outdated/vulnerable packages
        run: |
          npm outdated
          npm audit --audit-level=high

  # 2️⃣ Build & Deploy (only runs if security scan passes)
  build-and-deploy:
    needs: security-scan  # ⚠️ Waits for security checks first
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (version 22)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build the Next.js app
      - name: Build the Next.js app
        run: npm run build

      # 5️⃣ Verify build artifacts
      - name: Verify build outputs
        run: |
          echo "Build artifacts:"
          ls -la .next
          [ -f ".next/BUILD_ID" ] || { echo "❌ Build failed!"; exit 1; }

      # 6️⃣ Deploy to server
      - name: Ensure target directory exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            mkdir -p /home/ubuntu/temp_deploy

      # 7️⃣ Upload build files
      - name: Copy files to the server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          source: |
            .next/
            package.json
            package-lock.json
          target: /home/ubuntu/temp_deploy

      # 8️⃣ Run deployment commands
      - name: Deploy app on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            # Move files to production directory
            rsync -av --delete /home/ubuntu/temp_deploy/ /var/www/RHR-Frontend/
            
            # Install production dependencies
            cd /var/www/RHR-Frontend
            npm ci --omit=dev
            
            # Restart PM2 process
            pm2 start npm --name "rhr-frontend" -- start || pm2 restart rhr-frontend
            pm2 save
            pm2 list
            npm ci --omit=dev
            pm2 start npm --name "rhr-frontend" -- start || pm2 restart rhr-frontend
            pm2 save
